name: web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "docs/**"
      - "upstream-readings/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - "docs/**"
      - "upstream-readings/**"
      - ".github/workflows/web.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        run: npm ci --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: build
        run: npm run build
        env:
          # Skip Next.js telemetry on CI; cleaner logs.
          NEXT_TELEMETRY_DISABLED: "1"
