name: go

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "go.work"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "agents/**"
      - "go.work"
      - ".github/workflows/go.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        session:
          - s01-agent-registry
          - s02-prompt-loader
          - s03-magic-keywords
          - s04-config-loader
          - s05-hooks-pipeline
          - s06-mcp-tool-server
          - s07-continuation
          - s08-background-tasks
          - s09-task-state-machine
          - s10-team-watchdog
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: vet
        run: go vet ./...
        working-directory: agents/${{ matrix.session }}
      - name: build
        run: go build ./...
        working-directory: agents/${{ matrix.session }}
      - name: test
        run: |
          if [ -n "$(find . -name '*_test.go')" ]; then
            go test ./...
          else
            echo "no tests yet for ${{ matrix.session }}"
          fi
        working-directory: agents/${{ matrix.session }}
